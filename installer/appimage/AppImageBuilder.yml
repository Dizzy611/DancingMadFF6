# appimage-builder recipe see https://appimage-builder.readthedocs.io for details
version: 1
AppDir:
  path: ./AppDir
  app_info:
    id: science.domad.dancingmad
    name: Dancing Mad Installer
    icon: DancingMad
    version: latest
    exec: usr/bin/DanceMonkey
    exec_args: $@
  apt:
    arch:
    - amd64
    allow_unauthenticated: true
    sources:
    - sourceline: deb http://archive.ubuntu.com/ubuntu/ jammy main universe multiverse
    - sourceline: deb http://archive.ubuntu.com/ubuntu/ jammy-updates main universe multiverse
    - sourceline: deb http://security.ubuntu.com/ubuntu/ jammy-security main universe multiverse
    include:
    - libc6:amd64
    - libnsl2:amd64
    - libtirpc3:amd64
    - libfreetype6:amd64
    - libgbm1:amd64
    - libgl1:amd64
    - libgles2:amd64
    - libglvnd0:amd64
    - libglx0:amd64
    - libgomp1:amd64
    - libevdev2:amd64
    - libqt5core5a:amd64
    - libqt5gui5:amd64
    - libqt5widgets5:amd64
    - libqt5network5:amd64
    - libqt5multimedia5:amd64
    - libqt5xml5:amd64
    - libasound2:amd64
    - libpulse0:amd64
    - libpng16-16:amd64
    - libxext6:amd64
    - libxau6:amd64
    - libxdmcp6:amd64
    - libsm6:amd64
    - libice6:amd64
    - libx11-6:amd64
    - libxcb1:amd64
    - libxcb-render0:amd64
    - libxcb-shape0:amd64
    - libxcb-shm0:amd64
    - libxcb-xfixes0:amd64
    - libxkbcommon-x11-0:amd64
    - qtwayland5:amd64
    - zlib1g:amd64
    - libzstd1:amd64
  files:
    include: []
    exclude:
    - usr/share/man
    - usr/share/doc/*/README.*
    - usr/share/doc/*/changelog.*
    - usr/share/doc/*/NEWS.*
    - usr/share/doc/*/TODO.*
  runtime:
    env:
      QT_QPA_PLATFORM: xcb
  test:
    fedora-latest:
      image: appimagecrafters/tests-env:fedora-latest
      command: ./AppRun --help
    debian-stable:
      image: appimagecrafters/tests-env:debian-stable
      command: ./AppRun --help
    archlinux-latest:
      image: appimagecrafters/tests-env:archlinux-latest
      command: ./AppRun --help
AppImage:
  arch: x86_64
  update-information: guess
