name: Build Installer Windows (Qt5)

on:
  workflow_dispatch:
    inputs:
      publish_to_release:
        description: "Also upload installer artifacts to a GitHub release"
        required: false
        type: boolean
        default: false
      release_tag:
        description: "Release tag to publish to (required when publish_to_release is true)"
        required: false
        type: string
        default: ""
  workflow_call:
    inputs:
      publish_to_release:
        required: false
        type: boolean
        default: false
      release_tag:
        required: false
        type: string
        default: ""

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows Installer
    runs-on: windows-2022

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Validate release input
        shell: pwsh
        run: |
          if ("${{ inputs.publish_to_release }}" -eq "true" -and [string]::IsNullOrWhiteSpace("${{ inputs.release_tag }}")) {
            Write-Error "release_tag is required when publish_to_release is true"
            exit 1
          }

      - name: Set up MSYS2 (Qt5 toolchain)
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-qt5-base
            mingw-w64-x86_64-qt5-tools
            mingw-w64-x86_64-qt5-multimedia

      - name: Install packaging tools
        shell: pwsh
        run: |
          choco install 7zip -y

      - name: Configure installer (Qt5)
        shell: msys2 {0}
        run: |
          cmake -S installer -B build-installer \
            -G Ninja \
            -DQT_DEFAULT_MAJOR_VERSION=5 \
            -DCMAKE_BUILD_TYPE=Release

      - name: Build installer
        shell: msys2 {0}
        run: |
          cmake --build build-installer --parallel

      - name: Stage install tree
        shell: msys2 {0}
        run: |
          cmake --install build-installer --prefix "$GITHUB_WORKSPACE/dist"

      - name: Deploy Qt runtime
        shell: msys2 {0}
        run: |
          if [[ -x /mingw64/bin/windeployqt-qt5.exe ]]; then
            /mingw64/bin/windeployqt-qt5.exe --release --compiler-runtime --no-angle "$GITHUB_WORKSPACE/dist/bin/DanceMonkey.exe"
          else
            /mingw64/bin/windeployqt.exe --release --compiler-runtime --no-angle "$GITHUB_WORKSPACE/dist/bin/DanceMonkey.exe"
          fi

      - name: Build 7z + SFX executable
        shell: pwsh
        run: |
          Push-Location dist/bin
          7z a -t7z "$env:GITHUB_WORKSPACE/DancingMadInstaller-windows-extras.7z" "*"

          $sfxLines = @(
            ';!@Install@!UTF-8!',
            'Title="Dancing Mad Installer"',
            'RunProgram="DanceMonkey.exe"',
            ';!@InstallEnd@!'
          )
          Set-Content "$env:GITHUB_WORKSPACE/sfx-config.txt" -Value $sfxLines -NoNewline

          cmd /c copy /b "C:\Program Files\7-Zip\7z.sfx"+"$env:GITHUB_WORKSPACE\sfx-config.txt"+"$env:GITHUB_WORKSPACE\DancingMadInstaller-windows-extras.7z" "$env:GITHUB_WORKSPACE\DancingMadInstaller.exe"
          Pop-Location

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v5
        with:
          name: DancingMadInstaller-windows-${{ github.sha }}
          path: |
            DancingMadInstaller.exe
            DancingMadInstaller-windows-extras.7z
          if-no-files-found: error

      - name: Upload Windows artifacts to release
        if: ${{ inputs.publish_to_release }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag }}
          files: |
            DancingMadInstaller.exe
            DancingMadInstaller-windows-extras.7z
