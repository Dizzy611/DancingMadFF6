name: Build Installer Windows (Qt5)

on:
  workflow_dispatch:
    inputs:
      publish_to_release:
        description: "Also upload installer artifacts to a GitHub release"
        required: false
        type: boolean
        default: false
      release_tag:
        description: "Release tag to publish to (required when publish_to_release is true)"
        required: false
        type: string
        default: ""
  workflow_call:
    inputs:
      publish_to_release:
        required: false
        type: boolean
        default: false
      release_tag:
        required: false
        type: string
        default: ""

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows Installer
    runs-on: windows-2022

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Validate release input
        shell: pwsh
        run: |
          if ("${{ inputs.publish_to_release }}" -eq "true" -and [string]::IsNullOrWhiteSpace("${{ inputs.release_tag }}")) {
            Write-Error "release_tag is required when publish_to_release is true"
            exit 1
          }

      - name: Set up MSYS2 (Qt5 toolchain)
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-qt5-base
            mingw-w64-x86_64-qt5-tools
            mingw-w64-x86_64-qt5-multimedia

      - name: Install packaging tools
        shell: pwsh
        run: |
          choco install 7zip -y

      - name: Fetch 7-Zip extra SFX module
        shell: pwsh
        run: |
          $extraArchive = "$env:GITHUB_WORKSPACE/7z-extra.7z"

          $candidateUrls = @(
            "https://www.7-zip.org/a/7z2501-extra.7z",
            "https://www.7-zip.org/a/7z2301-extra.7z"
          )

          $downloaded = $false
          foreach ($url in $candidateUrls) {
            try {
              Invoke-WebRequest -Uri $url -OutFile $extraArchive
              $downloaded = $true
              Write-Host "Downloaded 7-Zip extra package from $url"
              break
            } catch {
              Write-Warning "Failed to download $url"
            }
          }

          if (-not $downloaded) {
            Write-Error "Unable to download a compatible 7-Zip extra package from any candidate URL"
            exit 1
          }

          & "C:\Program Files\7-Zip\7z.exe" x $extraArchive "-o$env:GITHUB_WORKSPACE/7z-extra" -y

      - name: Configure installer (Qt5)
        shell: msys2 {0}
        run: |
          cmake -S installer -B build-installer \
            -G Ninja \
            -DQT_DEFAULT_MAJOR_VERSION=5 \
            -DCMAKE_BUILD_TYPE=Release

      - name: Build installer
        shell: msys2 {0}
        run: |
          cmake --build build-installer --parallel

      - name: Stage install tree
        shell: msys2 {0}
        run: |
          cmake --install build-installer --prefix "$GITHUB_WORKSPACE/dist"

      - name: Deploy Qt runtime
        shell: msys2 {0}
        run: |
          if [[ -x /mingw64/bin/windeployqt-qt5.exe ]]; then
            /mingw64/bin/windeployqt-qt5.exe --release --compiler-runtime --no-angle "$GITHUB_WORKSPACE/dist/bin/DanceMonkey.exe"
          else
            /mingw64/bin/windeployqt.exe --release --compiler-runtime --no-angle "$GITHUB_WORKSPACE/dist/bin/DanceMonkey.exe"
          fi

      - name: Build 7z + SFX executable
        shell: pwsh
        run: |
          Push-Location dist/bin
          7z a -t7z "$env:GITHUB_WORKSPACE/DancingMadInstaller-windows-extras.7z" "*"

          $sfxLines = @(
            ';!@Install@!UTF-8!',
            'GUIMode="2"',
            'InstallPath="%TEMP%\\DancingMadInstaller"',
            'Title="Dancing Mad Installer"',
            'RunProgram="DanceMonkey.exe"',
            ';!@InstallEnd@!'
          )
          $sfxConfig = ($sfxLines -join "`r`n") + "`r`n"
          $utf8NoBom = New-Object System.Text.UTF8Encoding($false)
          [System.IO.File]::WriteAllText("$env:GITHUB_WORKSPACE/sfx-config.txt", $sfxConfig, $utf8NoBom)

          $sfxStub = Get-ChildItem -Path "$env:GITHUB_WORKSPACE/7z-extra" -Filter "7zSD.sfx" -Recurse | Select-Object -First 1
          if (-not $sfxStub) {
            Write-Error "Unable to find 7zSD.sfx in extracted 7-zip extra package"
            exit 1
          }

          $outputExe = "$env:GITHUB_WORKSPACE/DancingMadInstaller.exe"
          $archivePath = "$env:GITHUB_WORKSPACE/DancingMadInstaller-windows-extras.7z"
          $configPath = "$env:GITHUB_WORKSPACE/sfx-config.txt"

          $outStream = [System.IO.File]::Open($outputExe, [System.IO.FileMode]::Create, [System.IO.FileAccess]::Write)
          try {
            foreach ($inputPath in @($sfxStub.FullName, $configPath, $archivePath)) {
              $inStream = [System.IO.File]::OpenRead($inputPath)
              try {
                $inStream.CopyTo($outStream)
              } finally {
                $inStream.Dispose()
              }
            }
          } finally {
            $outStream.Dispose()
          }

          Pop-Location

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v5
        with:
          name: DancingMadInstaller-windows-${{ github.sha }}
          path: |
            DancingMadInstaller.exe
            DancingMadInstaller-windows-extras.7z
          if-no-files-found: error

      - name: Upload Windows artifacts to release
        if: ${{ inputs.publish_to_release }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag }}
          files: |
            DancingMadInstaller.exe
            DancingMadInstaller-windows-extras.7z
